# accelerate launch config for 2-GPU FSDP Full FT
# Use: accelerate launch --config_file configs/accelerate_fsdp.yaml src/train.py --config configs/full_ft_fsdp.yaml

compute_environment: LOCAL_MACHINE
distributed_type: FSDP
downcast_bf16: 'no'
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 4
rdzv_backend: static
same_network: true
use_cpu: false

fsdp_config:
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_backward_prefetch: BACKWARD_PRE
  fsdp_forward_prefetch: false
  fsdp_offload_params: false
  fsdp_sharding_strategy: FULL_SHARD
  fsdp_state_dict_type: FULL_STATE_DICT     # gather all shards to rank 0 at save time
                                            # → trainer.save_model() writes a standard HF checkpoint
                                            # (model.safetensors + config.json) directly loadable
                                            # by AutoModelForCausalLM.from_pretrained for eval.
                                            # Requires rank 0 CPU RAM ≈ model size (16 GB for 8B bf16).
  fsdp_sync_module_states: true
  fsdp_transformer_layer_cls_to_wrap: LlamaDecoderLayer
  fsdp_use_orig_params: true
  fsdp_cpu_ram_efficient_loading: true
  fsdp_activation_checkpointing: true
