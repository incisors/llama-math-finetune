# Full Fine-tuning — all 8B params trainable, FSDP across 4 GPUs
# Hardware: 4× A100 80GB SXM (RunPod, NVLink required)
# Expected VRAM: ~42 GB per GPU (safe margin vs 80 GB)
# Expected wall time: 6-8h for 50K samples, 1 epoch
#
# IMPORTANT:
#   - Launch with: accelerate launch --config_file configs/accelerate_fsdp.yaml src/train.py --config configs/full_ft_fsdp.yaml
#   - learning_rate is 10× LOWER than LoRA — Full FT is sensitive
#   - effective batch = per_device(2) × grad_accum(2) × num_gpus(4) = 16
#   - If OOM occurs on 4 GPUs: switch to per_device=1, grad_accum=4 (same effective batch, ~5 GB less per-GPU activation memory)

method: full_ft

model:
  name: meta-llama/Llama-3.1-8B

data:
  dataset_name: meta-math/MetaMathQA
  subset_size: 50000
  seed: 42
  max_seq_length: 1024

training:
  num_train_epochs: 1
  effective_batch_size: 16
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 2          # 2 × 2 × 4 GPUs = 16 effective
  gradient_checkpointing: true            # critical: keeps activations bounded
  optim: adamw_torch
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  bf16: true
  seed: 42
  learning_rate: 2.0e-5            # 10× lower than LoRA
  logging_steps: 10
  save_steps: 1000
  save_total_limit: 1              # 16 GB checkpoint each — keep only 1

distributed:
  framework: fsdp
  sharding_strategy: FULL_SHARD
  mixed_precision: bf16
  num_processes: 4

output:
  checkpoint_dir: ./checkpoints/full-ft
  wandb_project: llama-math-finetune
  wandb_run_name: full-ft
